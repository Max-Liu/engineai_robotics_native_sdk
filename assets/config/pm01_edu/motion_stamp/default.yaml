default_joint_pos:
  - -0.06 # 00 J00_HIP_PITCH_L
  - -0.06 # 01 J06_HIP_PITCH_R
  - 0     # 02 J12_WAIST_YAW
  - 0     # 03 J01_HIP_ROLL_L
  - 0     # 04 J07_HIP_ROLL_R
  - 0     # 05 J13_SHOULDER_PITCH_L
  - 0     # 06 J18_SHOULDER_PITCH_R
  - 0     # 07 J23_HEAD_YAW
  - 0     # 08 J02_HIP_YAW_L
  - 0     # 09 J08_HIP_YAW_R
  - 0.15  # 10 J14_SHOULDER_ROLL_L
  - -0.15 # 11 J19_SHOULDER_ROLL_R
  - 0.12  # 12 J03_KNEE_PITCH_L
  - 0.12  # 13 J09_KNEE_PITCH_R
  - 0     # 14 J15_SHOULDER_YAW_L
  - 0     # 15 J20_SHOULDER_YAW_R
  - -0.06 # 16 J04_ANKLE_PITCH_L
  - -0.06 # 17 J10_ANKLE_PITCH_R
  - -0.25 # 18 J16_ELBOW_PITCH_L
  - -0.25 # 19 J21_ELBOW_PITCH_R
  - 0     # 20 J05_ANKLE_ROLL_L
  - 0     # 21 J11_ANKLE_ROLL_R
  - 0     # 22 J17_ELBOW_YAW_L
  - 0     # 23 J22_ELBOW_YAW_R

# PD gains aligned with IsaacLab training config (pm01.py).
# Training uses ImplicitActuator with armature, so these are direct copies
# of the training-side stiffness/damping values. May need fine-tuning on
# real hardware due to sim-to-real actuator dynamics differences.
#
# Training groups:
#   hip_pitch / hip_roll / knee → K=120, D=10
#   hip_yaw / ankle / waist / shoulder / elbow / head → K=50, D=5
#
# Order matches joint_names above and the policy output order used by the runner.
joint_stiffness:
  - 120 # 00 J00_HIP_PITCH_L
  - 120 # 01 J06_HIP_PITCH_R
  - 50  # 02 J12_WAIST_YAW
  - 120 # 03 J01_HIP_ROLL_L
  - 120 # 04 J07_HIP_ROLL_R
  - 50  # 05 J13_SHOULDER_PITCH_L
  - 50  # 06 J18_SHOULDER_PITCH_R
  - 50  # 07 J23_HEAD_YAW
  - 50  # 08 J02_HIP_YAW_L
  - 50  # 09 J08_HIP_YAW_R
  - 50  # 10 J14_SHOULDER_ROLL_L
  - 50  # 11 J19_SHOULDER_ROLL_R
  - 120 # 12 J03_KNEE_PITCH_L
  - 120 # 13 J09_KNEE_PITCH_R
  - 50  # 14 J15_SHOULDER_YAW_L
  - 50  # 15 J20_SHOULDER_YAW_R
  - 50  # 16 J04_ANKLE_PITCH_L
  - 50  # 17 J10_ANKLE_PITCH_R
  - 50  # 18 J16_ELBOW_PITCH_L
  - 50  # 19 J21_ELBOW_PITCH_R
  - 50  # 20 J05_ANKLE_ROLL_L
  - 50  # 21 J11_ANKLE_ROLL_R
  - 50  # 22 J17_ELBOW_YAW_L
  - 50  # 23 J22_ELBOW_YAW_R
joint_damping:
  - 10 # 00 J00_HIP_PITCH_L
  - 10 # 01 J06_HIP_PITCH_R
  - 5  # 02 J12_WAIST_YAW
  - 10 # 03 J01_HIP_ROLL_L
  - 10 # 04 J07_HIP_ROLL_R
  - 5  # 05 J13_SHOULDER_PITCH_L
  - 5  # 06 J18_SHOULDER_PITCH_R
  - 5  # 07 J23_HEAD_YAW
  - 5  # 08 J02_HIP_YAW_L
  - 5  # 09 J08_HIP_YAW_R
  - 5  # 10 J14_SHOULDER_ROLL_L
  - 5  # 11 J19_SHOULDER_ROLL_R
  - 10 # 12 J03_KNEE_PITCH_L
  - 10 # 13 J09_KNEE_PITCH_R
  - 5  # 14 J15_SHOULDER_YAW_L
  - 5  # 15 J20_SHOULDER_YAW_R
  - 5  # 16 J04_ANKLE_PITCH_L
  - 5  # 17 J10_ANKLE_PITCH_R
  - 5  # 18 J16_ELBOW_PITCH_L
  - 5  # 19 J21_ELBOW_PITCH_R
  - 5  # 20 J05_ANKLE_ROLL_L
  - 5  # 21 J11_ANKLE_ROLL_R
  - 5  # 22 J17_ELBOW_YAW_L
  - 5  # 23 J22_ELBOW_YAW_R

